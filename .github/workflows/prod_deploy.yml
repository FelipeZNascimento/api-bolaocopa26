name: 🔥 Build & Deploy to PROD

on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  prod-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js with .nvmrc version
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 📦 Prepare dist for deployment
        run: cp package.json package-lock.json dist/

      - id: deployProd
        name: 📂 Sync files to prod folder
        continue-on-error: true
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.server }}
          username: ${{ secrets.username }}
          password: ${{secrets.password}}
          localDir: "./dist/"
          remoteDir: "./"
          port: 22

      - name: 🔁 Retry PROD upload if handshake failed
        if: steps.deployProd.outcome == 'failure'
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.server }}
          username: ${{ secrets.username }}
          password: ${{secrets.password}}
          localDir: "./dist/"
          remoteDir: "./"
          port: 22

  rerun-failed-jobs:
    runs-on: ubuntu-latest
    needs: [prod-deployment]
    if: failure()
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Rerun failed jobs in the current workflow
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry_workflow.yml -F run_id=${{ github.run_id }}
