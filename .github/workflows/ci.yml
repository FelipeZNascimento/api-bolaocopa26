name: ❄️ CI and Deploy to PPROD

on:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  pprod-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: 🔨 Build Project
        run: npm run build

      - name: 📦 Prepare dist for deployment
        run: cp package.json package-lock.json dist/

      - name: 📂 Sync files to PPROD folder
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.server }}
          username: ${{ secrets.username_pprod }}
          password: ${{secrets.password_pprod}}
          port: 22
          uploads: |
            ./dist/ => ./
  rerun-failed-jobs:
    runs-on: ubuntu-latest
    needs: [pprod-deployment]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Rerun failed jobs in the current workflow
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry_workflow.yml -F run_id=${{ github.run_id }}
